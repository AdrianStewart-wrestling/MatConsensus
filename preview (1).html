const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const logEl = document.getElementById('log');
const btn = document.getElementById('seedBtn');

function log(msg) { logEl.textContent += `
${msg}`; }

btn.addEventListener('click', async () => {
  btn.disabled = true;
  logEl.textContent = 'Seeding...';
  try {
    let batch = writeBatch(db);
    let opCount = 0;
    const flush = async () => {
      await batch.commit();
      batch = writeBatch(db);
      opCount = 0;
    };
    const queueSet = async (ref, data) => {
      batch.set(ref, data, { merge: true });
      opCount += 1;
      if (opCount >= 400) await flush();
    };

    await queueSet(doc(db, 'weeks', 'current'), SEED.currentWeek);

    for (const wrestler of SEED.wrestlers) {
      await queueSet(doc(db, 'wrestlers', wrestler.id), wrestler);
    }

    for (const ballot of SEED.ballots) {
      const ballotRef = doc(collection(db, 'ballots'));
      await queueSet(ballotRef, ballot);
    }

    for (const ranking of SEED.rankings) {
      await queueSet(doc(db, 'rankings', ranking.weekId, 'weights', String(ranking.weight)), ranking);
    }

    if (opCount > 0) await flush();
    log('Done. Firestore is seeded.');
  } catch (err) {
    console.error(err);
    log(`Failed: ${err.message}`);
  } finally {
    btn.disabled = false;
  }
});
</script>
